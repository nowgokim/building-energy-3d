services:
  db:
    image: pgrouting/pgrouting:16-3.5-3.6.3
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432"   # 로컬 바인딩 — 외부 직접 접근 차단
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    environment:
      POSTGRES_DB: buildings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      # trust 인증 제거 — scram-sha-256 사용 (기존 컨테이너는 pg_hba.conf 수동 업데이트 필요)
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"   # 로컬 바인딩 — 외부 직접 접근 차단
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redisdata:/data

  api:
    build: .
    restart: unless-stopped
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000  # --reload 제거 (프로덕션)
    ports:
      - "127.0.0.1:8000:8000"  # 외부 직접 노출 차단 (Cloudflare Tunnel → Vite 프록시 경유)
    volumes:
      - .:/app:ro  # 읽기 전용 마운트 — 컨테이너 침해 시 호스트 파일 변조 방지
      - /app/scratch  # scratch 폴더만 쓰기 허용
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/buildings
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

  worker:
    build: .
    restart: unless-stopped
    command: celery -A src.shared.celery_app worker --loglevel=warning
    volumes:
      - .:/app:ro
      - /app/scratch
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/buildings
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      API_HOST: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  frontend_node_modules:
