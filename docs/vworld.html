<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마포구 3D 건물 에너지 지도</title>
  <script src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=7313CF5F-7479-3683-A360-270B72C03B88&domain=jukim.github.io"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; }
    #vmap { width: 100vw; height: 100vh; }

    #search-bar {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 100;
      width: 360px;
    }
    #search-bar input {
      width: 100%; padding: 10px 16px; border-radius: 8px; border: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15); font-size: 14px; outline: none;
      background: rgba(255,255,255,0.95);
    }
    #search-results {
      margin-top: 4px; background: rgba(255,255,255,0.95); border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15); max-height: 240px; overflow-y: auto;
      display: none;
    }
    #search-results .item {
      padding: 8px 16px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #eee;
    }
    #search-results .item:hover { background: #f0f7ff; }

    #panel {
      position: absolute; top: 12px; right: 12px; width: 230px; z-index: 100;
      max-height: calc(100vh - 24px);
      background: rgba(255,255,255,0.96); border-radius: 10px; box-shadow: 0 2px 16px rgba(0,0,0,0.15);
      overflow-y: auto; display: none; padding: 12px;
    }
    #panel .close { float: right; cursor: pointer; font-size: 18px; color: #999; line-height: 1; }
    #panel h2 { font-size: 13px; margin: 0 0 8px; }
    #panel .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    #panel .metric { text-align: center; background: #f5f5f5; border-radius: 6px; padding: 6px 4px; }
    #panel .metric .value { font-size: 14px; font-weight: bold; }
    #panel .metric .label { font-size: 9px; color: #888; }
    #panel .info { font-size: 12px; }
    #panel .info dt { color: #888; }
    #panel .info dd { margin: 0 0 4px; font-weight: 500; }

    #stats-bar {
      position: absolute; bottom: 12px; left: 12px; z-index: 100;
      background: rgba(255,255,255,0.9); border-radius: 8px; padding: 8px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-size: 13px;
    }

    #legend {
      position: absolute; bottom: 12px; right: 12px; z-index: 100;
      background: rgba(255,255,255,0.9); border-radius: 8px; padding: 8px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    #legend .title { font-size: 10px; color: #888; margin-bottom: 4px; }
    #legend .colors { display: flex; gap: 2px; }
    #legend .colors .c { width: 20px; height: 12px; border-radius: 2px; }
    #legend .labels { display: flex; justify-content: space-between; font-size: 8px; color: #888; }

    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      z-index: 200; color: #fff; font-size: 14px; background: rgba(0,0,0,0.7);
      padding: 12px 24px; border-radius: 8px; }

    #texture-panel {
      position: absolute; top: 108px; left: 12px; z-index: 100;
      background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15); width: 210px; display: none;
      font-size: 12px;
    }
    #texture-panel h3 { margin: 0 0 6px; font-size: 13px; }
    #texture-panel label { display: block; margin: 4px 0 2px; color: #666; font-size: 10px; }
    #texture-panel input, #texture-panel select {
      width: 100%; padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px;
    }
    #texture-panel .btn {
      margin-top: 6px; padding: 5px 10px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 11px;
    }
    #texture-panel .btn-apply { background: #4a9eff; color: #fff; }
    #texture-panel .btn-remove { background: #ff5252; color: #fff; margin-left: 4px; }
    #texture-panel .btn-toggle { background: #666; color: #fff; }
    #applied-faces { margin-top: 4px; max-height: 100px; overflow-y: auto; }
    .face-item { display: flex; align-items: center; gap: 4px; padding: 2px 0; border-bottom: 1px solid #eee; }
    .face-item .face-name { flex: 1; font-size: 10px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .face-item .face-remove { background: #ff5252; color: #fff; border: none; border-radius: 3px; padding: 1px 5px; cursor: pointer; font-size: 10px; flex-shrink: 0; }
    #texture-btn {
      position: absolute; top: 60px; left: 12px; z-index: 100;
      background: rgba(255,255,255,0.9); border: none; border-radius: 8px;
      padding: 8px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer; font-size: 13px; transition: background 0.2s, color 0.2s;
    }
    #fire-btn {
      position: absolute; top: 60px; left: 148px; z-index: 100;
      background: rgba(255,255,255,0.9); border: none; border-radius: 8px;
      padding: 8px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer; font-size: 13px; transition: background 0.2s, color 0.2s;
    }
    #cluster-btn {
      position: absolute; top: 60px; left: 264px; z-index: 100;
      background: rgba(255,255,255,0.9); border: none; border-radius: 8px;
      padding: 8px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer; font-size: 13px; transition: background 0.2s, color 0.2s;
    }
    #station-btn {
      position: absolute; top: 60px; left: 380px; z-index: 100;
      background: rgba(255,255,255,0.9); border: none; border-radius: 8px;
      padding: 8px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer; font-size: 13px; transition: background 0.2s, color 0.2s;
    }
    #fire-legend {
      display: none; position: absolute; top: 100px; left: 148px; z-index: 100;
      background: rgba(255,255,255,0.93); border-radius: 8px; padding: 8px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12); font-size: 11px; min-width: 180px;
    }
    #fire-legend .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:4px; vertical-align:middle; }
  </style>
</head>
<body>
  <div id="vmap"></div>
  <div id="loading" class="loading">3D 지도 로딩 중...</div>

  <!-- Texture Overlay Button -->
  <button id="texture-btn" onclick="toggleTexturePanel()">🎨 텍스처</button>

  <!-- Fire Risk Button -->
  <button id="fire-btn" onclick="toggleFireMode()">🔥 화재위험</button>

  <!-- Cluster Button -->
  <button id="cluster-btn" onclick="toggleClusters()">🗺 고위험클러스터</button>

  <!-- Fire Station Button -->
  <button id="station-btn" onclick="toggleStations()">🚒 소방서</button>

  <!-- Fire Risk Legend (fire mode 활성 시 표시) -->
  <div id="fire-legend">
    <div style="font-weight:600;margin-bottom:5px;color:#333">화재 위험도</div>
    <div><span class="dot" style="background:#ff4444"></span>고위험 (60점 이상)</div>
    <div style="margin:3px 0"><span class="dot" style="background:#ff8c00"></span>중위험 (35~59점)</div>
    <div><span class="dot" style="background:#22c55e"></span>저위험 (35점 미만)</div>
    <div id="fire-status" style="margin-top:6px;color:#888;font-size:10px;"></div>
  </div>

  <!-- Texture Overlay Panel -->
  <div id="texture-panel">
    <h3>🎨 면 텍스처</h3>
    <div style="font-size:10px;color:#4a9eff;margin-bottom:6px;">건물 면을 클릭하면 해당 면에 적용</div>

    <label>이미지 URL 또는 파일</label>
    <input type="text" id="tex-url" placeholder="/uploads/test_texture.jpg" value="/uploads/test_texture.jpg" />
    <input type="file" id="tex-file" accept="image/*" style="margin-top:4px" />

    <label>투명도</label>
    <input type="range" id="tex-alpha" min="0.1" max="1.0" step="0.1" value="0.9" />

    <div style="margin-top:8px">
      <button class="btn btn-remove" onclick="removeTexture()">전체 제거</button>
    </div>
    <div id="tex-status" style="margin-top:6px; font-size:10px; color:#888;"></div>
    <div id="applied-faces-label" style="font-size:10px;color:#666;margin-top:6px;display:none;">적용된 면</div>
    <div id="applied-faces"></div>
  </div>

  <!-- Search -->
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="건물명 또는 주소 검색..." />
    <div id="search-results"></div>
  </div>

  <!-- Detail Panel -->
  <div id="panel">
    <span class="close" onclick="closePanel()">×</span>
    <h2 id="p-name">건물 정보</h2>
    <div class="metrics">
      <div class="metric"><div class="value" id="p-grade">-</div><div class="label">에너지등급</div></div>
      <div class="metric"><div class="value" id="p-energy">-</div><div class="label">kWh/m²</div></div>
      <div class="metric"><div class="value" id="p-area">-</div><div class="label">m² 연면적</div></div>
    </div>
    <dl class="info">
      <dt>PNU</dt><dd id="p-pnu">-</dd>
      <dt>용도</dt><dd id="p-usage">-</dd>
      <dt>구조</dt><dd id="p-struct">-</dd>
      <dt>층수</dt><dd id="p-floors">-</dd>
      <dt>높이</dt><dd id="p-height">-</dd>
      <dt>건축년도</dt><dd id="p-year">-</dd>
    </dl>
    <div id="p-energy-chart"></div>
    <div id="p-fire-risk" style="display:none;border-top:1px solid #eee;padding-top:8px;margin-top:6px;"></div>
  </div>

  <!-- Stats -->
  <div id="stats-bar">
    <span>건물 <b id="s-count">-</b></span> &nbsp;
    <span>평균 에너지 <b id="s-energy">-</b></span>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="title">에너지 소비량 (kWh/m²/yr)</div>
    <div class="colors">
      <div class="c" style="background:#4cb848"></div>
      <div class="c" style="background:#8dc63f"></div>
      <div class="c" style="background:#d4e157"></div>
      <div class="c" style="background:#fdd835"></div>
      <div class="c" style="background:#ffb300"></div>
      <div class="c" style="background:#fb8c00"></div>
    </div>
    <div class="labels"><span>효율적</span><span>비효율적</span></div>
  </div>

  <script>
    const API = "/api/v1";
    let currentAbort = null;

    // --- VWorld Map Init ---
    var map = new vw.Map();
    map.setOption({
      mapId: "vmap",
      initPosition: new vw.CameraPosition(
        new vw.CoordZ(126.935, 37.555, 800),
        new vw.Direction(30, -35, 0)
      ),
      logo: true,
      navigation: true,
    });
    map.start();

    // --- After 3D scene ready ---
    vw.ws3dInitCallBack = function () {
      document.getElementById("loading").style.display = "none";
      const viewer = ws3d.viewer;

      // --- 성능 + 안정화 ---
      // 타일 동시 요청 수 증가
      Cesium.RequestScheduler.requestsByServer["xdworld.vworld.kr:443"] = 12;
      // 타일 캐시 유지 (건물 깜빡임 방지)
      viewer.scene.globe.tileCacheSize = 1000;
      // 먼 거리 fog (너무 많은 타일 로드 방지)
      viewer.scene.fog.enabled = true;
      viewer.scene.fog.density = 0.0002;
      // 3D 타일 메모리 유지 (언로드 방지)
      viewer.scene.globe.maximumScreenSpaceError = 2;
      // 프레임 안정화
      viewer.scene.debugShowFramesPerSecond = false;
      viewer.scene.useDepthPicking = true;

      // Load stats
      fetch(API + "/buildings/stats")
        .then((r) => r.json())
        .then((d) => {
          document.getElementById("s-count").textContent = d.total_count?.toLocaleString() || "-";
          document.getElementById("s-energy").textContent = d.avg_energy ? d.avg_energy.toFixed(0) + " kWh/m²" : "-";
        });

      // Click handler — server-side pick
      viewer.screenSpaceEventHandler.setInputAction(function (event) {
        if (currentAbort) currentAbort.abort();
        const controller = new AbortController();
        currentAbort = controller;

        let cartesian = viewer.scene.pickPosition(event.position);
        if (!cartesian) {
          const ray = viewer.camera.getPickRay(event.position);
          if (ray) cartesian = viewer.scene.globe.pick(ray, viewer.scene);
        }
        if (!cartesian) {
          // 빈 하늘 클릭 → 텍스처 패널 닫기
          closeTexturePanel();
          return;
        }

        const carto = Cesium.Cartographic.fromCartesian(cartesian);
        const lng = Cesium.Math.toDegrees(carto.longitude);
        const lat = Cesium.Math.toDegrees(carto.latitude);

        fetch(API + "/buildings/pick?lng=" + lng + "&lat=" + lat, { signal: controller.signal })
          .then((r) => r.json())
          .then((result) => {
            if (!result.pnu) return;
            if (textureMode) {
              // 텍스처 모드: 면 텍스처만 적용, 에너지 패널 표시 안 함
              applyFaceTexture(lng, lat, carto.height, result.pnu, controller.signal);
              return;
            }
            // 에너지 모드: 건물 상세 정보 표시
            return fetch(API + "/buildings/" + result.pnu, { signal: controller.signal });
          })
          .then((r) => r && r.json())
          .then((detail) => {
            if (detail) {
              showPanel(detail);
              fetchFireRisk(detail.properties.pnu);
            }
          })
          .catch((e) => { if (e.name !== "AbortError") console.error(e); });
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      console.log("VWorld 3D map ready + energy overlay active");
    };

    // --- Fire Risk Layer ---
    let firePointCollection = null;
    let fireMode = false;

    function fireRiskColor(grade) {
      if (grade === 'HIGH')   return Cesium.Color.fromCssColorString('#ff4444').withAlpha(0.9);
      if (grade === 'MEDIUM') return Cesium.Color.fromCssColorString('#ff8c00').withAlpha(0.75);
      return Cesium.Color.fromCssColorString('#22c55e').withAlpha(0.7);
    }

    async function loadFireRiskLayer() {
      const viewer = ws3d.viewer;
      clearFireRiskLayer();
      const rect = viewer.camera.computeViewRectangle();
      if (!rect) return;
      const west  = Cesium.Math.toDegrees(rect.west);
      const south = Cesium.Math.toDegrees(rect.south);
      const east  = Cesium.Math.toDegrees(rect.east);
      const north = Cesium.Math.toDegrees(rect.north);
      document.getElementById('fire-status').textContent = '로딩 중...';
      try {
        const resp = await fetch(`${API}/fire/risk?west=${west}&south=${south}&east=${east}&north=${north}`);
        const data = await resp.json();
        firePointCollection = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
        data.features.forEach(f => {
          firePointCollection.add({
            position: Cesium.Cartesian3.fromDegrees(f.lng, f.lat, 5),
            color: fireRiskColor(f.grade),
            pixelSize: f.grade === 'HIGH' ? 10 : 7,
            outlineColor: Cesium.Color.WHITE.withAlpha(0.4),
            outlineWidth: 1,
            heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
          });
        });
        const highCnt = data.features.filter(f => f.grade === 'HIGH').length;
        document.getElementById('fire-status').textContent =
          `조회 ${data.count.toLocaleString()}건 · 고위험 ${highCnt.toLocaleString()}건`;
      } catch(e) {
        document.getElementById('fire-status').textContent = '로드 실패: ' + e.message;
      }
    }

    function clearFireRiskLayer() {
      if (firePointCollection) {
        ws3d.viewer.scene.primitives.remove(firePointCollection);
        firePointCollection = null;
      }
      document.getElementById('fire-status').textContent = '';
    }

    // --- Cluster Layer ---
    let clusterEntities = [];
    let clusterMode = false;

    function clusterRiskColor(level) {
      if (level === 'HIGH')   return Cesium.Color.fromCssColorString('#ff4444').withAlpha(0.35);
      if (level === 'MEDIUM') return Cesium.Color.fromCssColorString('#ff8c00').withAlpha(0.25);
      return Cesium.Color.fromCssColorString('#22c55e').withAlpha(0.2);
    }

    async function loadClusters() {
      const viewer = ws3d.viewer;
      clearClusters();
      const rect = viewer.camera.computeViewRectangle();
      if (!rect) return;
      const west  = Cesium.Math.toDegrees(rect.west);
      const south = Cesium.Math.toDegrees(rect.south);
      const east  = Cesium.Math.toDegrees(rect.east);
      const north = Cesium.Math.toDegrees(rect.north);
      try {
        const resp = await fetch(`${API}/fire/clusters?west=${west}&south=${south}&east=${east}&north=${north}`);
        const data = await resp.json();
        data.clusters.forEach(c => {
          if (!c.geometry || !c.geometry.coordinates) return;
          // ConvexHull은 Polygon
          const coords = c.geometry.type === 'Polygon'
            ? c.geometry.coordinates[0]
            : (c.geometry.type === 'Point' ? null : null);
          if (!coords || coords.length < 3) return;
          const positions = Cesium.Cartesian3.fromDegreesArray(coords.flatMap(pt => [pt[0], pt[1]]));
          const entity = viewer.entities.add({
            name: `cluster_${c.cluster_id}`,
            polygon: {
              hierarchy: new Cesium.PolygonHierarchy(positions),
              material: clusterRiskColor(c.risk_level),
              outline: true,
              outlineColor: clusterRiskColor(c.risk_level).withAlpha(0.9),
              outlineWidth: 2,
              height: 1,
              perPositionHeight: false,
            },
          });
          clusterEntities.push(entity);
        });
        const btn = document.getElementById('cluster-btn');
        btn.title = `${data.count}개 클러스터 표시 중`;
      } catch(e) {
        console.error('cluster load error', e);
      }
    }

    function clearClusters() {
      const viewer = ws3d.viewer;
      clusterEntities.forEach(e => viewer.entities.remove(e));
      clusterEntities = [];
    }

    function toggleClusters() {
      clusterMode = !clusterMode;
      const btn = document.getElementById('cluster-btn');
      if (clusterMode) {
        btn.textContent = '🗺 클러스터 ON';
        btn.style.background = '#9333ea';
        btn.style.color = '#fff';
        loadClusters();
      } else {
        btn.textContent = '🗺 고위험클러스터';
        btn.style.background = 'rgba(255,255,255,0.9)';
        btn.style.color = '#333';
        clearClusters();
      }
    }

    // --- Station Layer ---
    let stationEntities = [];
    let stationMode = false;

    async function loadStations() {
      const viewer = ws3d.viewer;
      clearStations();
      const rect = viewer.camera.computeViewRectangle();
      if (!rect) return;
      const west  = Cesium.Math.toDegrees(rect.west);
      const south = Cesium.Math.toDegrees(rect.south);
      const east  = Cesium.Math.toDegrees(rect.east);
      const north = Cesium.Math.toDegrees(rect.north);
      try {
        const resp = await fetch(`${API}/fire/stations?west=${west}&south=${south}&east=${east}&north=${north}`);
        const data = await resp.json();
        data.stations.forEach(s => {
          const entity = viewer.entities.add({
            name: s.name,
            position: Cesium.Cartesian3.fromDegrees(s.lng, s.lat, 10),
            billboard: {
              image: 'data:image/svg+xml;base64,' + btoa(
                `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">` +
                `<circle cx="18" cy="18" r="16" fill="#ff4444" stroke="#fff" stroke-width="2"/>` +
                `<text x="18" y="23" text-anchor="middle" fill="#fff" font-size="16" font-family="sans-serif">🚒</text>` +
                `</svg>`
              ),
              width: 36,
              height: 36,
              verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
              heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
            },
            label: {
              text: s.name,
              font: '11px sans-serif',
              fillColor: Cesium.Color.WHITE,
              outlineColor: Cesium.Color.BLACK,
              outlineWidth: 2,
              style: Cesium.LabelStyle.FILL_AND_OUTLINE,
              verticalOrigin: Cesium.VerticalOrigin.TOP,
              pixelOffset: new Cesium.Cartesian2(0, 4),
              heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
              disableDepthTestDistance: Number.POSITIVE_INFINITY,
            },
          });
          stationEntities.push(entity);
        });
      } catch(e) {
        console.error('station load error', e);
      }
    }

    function clearStations() {
      const viewer = ws3d.viewer;
      stationEntities.forEach(e => viewer.entities.remove(e));
      stationEntities = [];
    }

    function toggleStations() {
      stationMode = !stationMode;
      const btn = document.getElementById('station-btn');
      if (stationMode) {
        btn.textContent = '🚒 소방서 ON';
        btn.style.background = '#dc2626';
        btn.style.color = '#fff';
        loadStations();
      } else {
        btn.textContent = '🚒 소방서';
        btn.style.background = 'rgba(255,255,255,0.9)';
        btn.style.color = '#333';
        clearStations();
      }
    }

    function toggleFireMode() {
      fireMode = !fireMode;
      const btn = document.getElementById('fire-btn');
      const legend = document.getElementById('fire-legend');
      if (fireMode) {
        btn.textContent = '🔥 화재위험 ON';
        btn.style.background = '#ff4444';
        btn.style.color = '#fff';
        legend.style.display = 'block';
        loadFireRiskLayer();
      } else {
        btn.textContent = '🔥 화재위험';
        btn.style.background = 'rgba(255,255,255,0.9)';
        btn.style.color = '#333';
        legend.style.display = 'none';
        clearFireRiskLayer();
      }
    }

    async function fetchFireRisk(pnu) {
      try {
        const resp = await fetch(`${API}/fire/risk/${pnu}`);
        if (!resp.ok) { document.getElementById('p-fire-risk').style.display = 'none'; return; }
        const risk = await resp.json();
        const color = risk.risk_grade === 'HIGH' ? '#ff4444'
                    : risk.risk_grade === 'MEDIUM' ? '#ff8c00' : '#22c55e';
        const label = risk.risk_grade === 'HIGH' ? '고위험'
                    : risk.risk_grade === 'MEDIUM' ? '중위험' : '저위험';
        const el = document.getElementById('p-fire-risk');
        el.style.display = 'block';
        el.innerHTML =
          '<div style="font-size:11px;color:#888;margin-bottom:4px">🔥 화재 위험도</div>' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
          '<span style="background:' + color + ';color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:bold">' + label + '</span>' +
          '<span style="font-size:20px;font-weight:bold;color:' + color + '">' + risk.total_score +
          '<span style="font-size:10px;color:#888;font-weight:normal">/100점</span></span>' +
          '</div>' +
          '<div style="font-size:10px;color:#777">' +
          '구조 ' + risk.breakdown.structure.score + '점 · ' +
          '연령 ' + risk.breakdown.age.score + '점 · ' +
          '용도 ' + risk.breakdown.usage.score + '점 · ' +
          '층수 ' + risk.breakdown.height.score + '점</div>' +
          '<div id="p-coverage" style="margin-top:4px;font-size:10px;color:#999">소방서 응답시간 조회 중...</div>';
        fetchStationCoverage(pnu);
      } catch(_) {
        document.getElementById('p-fire-risk').style.display = 'none';
      }
    }

    async function fetchStationCoverage(pnu) {
      const el = document.getElementById('p-coverage');
      if (!el) return;
      try {
        const resp = await fetch(`${API}/fire/coverage/${pnu}`);
        if (!resp.ok) { el.style.display = 'none'; return; }
        const data = await resp.json();
        const s = data.nearest_stations[0];
        if (!s) { el.style.display = 'none'; return; }
        const timeColor = s.est_response_min <= 5 ? '#22c55e'
                        : s.est_response_min <= 10 ? '#ff8c00' : '#ff4444';
        el.innerHTML =
          '🚒 최근접 소방서: <b>' + s.name + '</b> ' +
          '(<span style="color:' + timeColor + ';font-weight:bold">' + s.est_response_min + '분</span>' +
          ' / ' + (s.distance_m/1000).toFixed(1) + 'km)';
      } catch(_) {
        if (el) el.style.display = 'none';
      }
    }

    // --- Texture Overlay ---
    let textureEntities = [];
    let textureMode = false;  // 텍스처 모드 ON/OFF (에너지 정보 표시와 배타적)

    // Haversine 거리 (미터) — 88000/111000 근사 대체
    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // 폴리곤 방향 정규화 — Shoelace 공식으로 CCW 보장 (텍스처 방향 일관성)
    function ensureCCW(ring) {
      let area = 0;
      for (let i = 0; i < ring.length - 1; i++) {
        area += ring[i][0] * ring[i+1][1];
        area -= ring[i+1][0] * ring[i][1];
      }
      return area < 0 ? [...ring].reverse() : ring;
    }

    // 이미지 CORS 프리로드 검증
    function preloadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(url);
        img.onerror = () => reject(new Error('이미지 로드 실패: ' + url));
        img.src = url;
      });
    }

    function closeTexturePanel() {
      textureMode = false;
      document.getElementById("texture-panel").style.display = "none";
      const btn = document.getElementById("texture-btn");
      btn.textContent = "🎨 텍스처";
      btn.style.background = "rgba(255,255,255,0.9)";
      btn.style.color = "#333";
    }

    function toggleTexturePanel() {
      textureMode = !textureMode;
      const panel = document.getElementById("texture-panel");
      const btn = document.getElementById("texture-btn");
      if (textureMode) {
        panel.style.display = "block";
        btn.textContent = "🎨 텍스처 ON";
        btn.style.background = "#4a9eff";
        btn.style.color = "#fff";
      } else {
        panel.style.display = "none";
        btn.textContent = "🎨 텍스처";
        btn.style.background = "rgba(255,255,255,0.9)";
        btn.style.color = "#333";
      }
    }

    // File input → convert to data URL
    document.getElementById("tex-file").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById("tex-url").value = ev.target.result;
        document.getElementById("tex-status").textContent = "이미지 로드: " + file.name;
      };
      reader.readAsDataURL(file);
    });

    // 점 P에서 선분 (A→B)까지의 최단 거리 — cos(lat) 보정으로 경도 왜곡 제거
    function pointToSegmentDist(px, py, ax, ay, bx, by) {
      const cosLat = Math.cos((py + ay) / 2 * Math.PI / 180);
      // 경도를 미터 비례로 보정
      const spx = px * cosLat, spy = py;
      const sax = ax * cosLat, say = ay;
      const sbx = bx * cosLat, sby = by;
      const dx = sbx - sax, dy = sby - say;
      if (dx === 0 && dy === 0) return Math.hypot(spx - sax, spy - say);
      const t = Math.max(0, Math.min(1, ((spx-sax)*dx + (spy-say)*dy) / (dx*dx + dy*dy)));
      return Math.hypot(spx - (sax + t*dx), spy - (say + t*dy));
    }

    // 클릭 좌표에서 가장 가까운 footprint edge 인덱스 반환
    function findNearestEdge(outerRing, clickLng, clickLat) {
      let minDist = Infinity, nearestIdx = 0;
      for (let i = 0; i < outerRing.length - 1; i++) {
        const dist = pointToSegmentDist(
          clickLng, clickLat,
          outerRing[i][0], outerRing[i][1],
          outerRing[i+1][0], outerRing[i+1][1]
        );
        if (dist < minDist) { minDist = dist; nearestIdx = i; }
      }
      return nearestIdx;
    }

    // 클릭한 면에만 텍스처 적용
    async function applyFaceTexture(clickLng, clickLat, clickHeight, pnu, signal) {
      const imageUrl = document.getElementById("tex-url").value.trim();
      const alpha = parseFloat(document.getElementById("tex-alpha").value);
      const statusEl = document.getElementById("tex-status");

      if (!imageUrl) {
        statusEl.textContent = "이미지 URL을 먼저 입력하세요";
        return;
      }

      const absImageUrl = imageUrl.startsWith('/') ? window.location.origin + imageUrl : imageUrl;

      // 이미지 프리로드 (첫 번째 적용 시만 검증)
      if (!applyFaceTexture._validated || applyFaceTexture._lastUrl !== absImageUrl) {
        try {
          await preloadImage(absImageUrl);
          applyFaceTexture._validated = true;
          applyFaceTexture._lastUrl = absImageUrl;
        } catch(e) {
          statusEl.textContent = "❌ 이미지 로드 실패: " + imageUrl;
          return;
        }
      }

      statusEl.textContent = "건물 정보 조회 중...";
      try {
        const resp = await fetch(API + "/buildings/" + pnu, { signal });
        const detail = await resp.json();
        const p = detail.properties;
        const geom = detail.geometry;

        if (!p || !p.lng || !p.lat || !geom) {
          statusEl.textContent = "건물 데이터 없음";
          return;
        }

        const buildingHeight = p.height || 10;
        const viewer = ws3d.viewer;

        // 지형 높이 샘플링
        let terrainBase = 0;
        try {
          const [sampled] = await Cesium.sampleTerrainMostDetailed(
            viewer.terrainProvider,
            [Cesium.Cartographic.fromDegrees(p.lng, p.lat)]
          );
          terrainBase = sampled.height || 0;
        } catch(_) {
          terrainBase = viewer.scene.globe.getHeight(
            Cesium.Cartographic.fromDegrees(p.lng, p.lat)
          ) || 0;
        }

        // 클릭 높이로 건물 높이 추정: 클릭 지점 기준 절대높이 사용
        const clickAltAbsolute = clickHeight; // 해수면 기준
        // 건물 높이는 API 값, 지형 기준으로 최소/최대 결정
        const wallBottom = terrainBase;
        const wallTop = terrainBase + buildingHeight;

        // Polygon vs MultiPolygon 처리 — coordinates 구조가 다름
        let outerRing;
        if (geom.type === 'MultiPolygon') {
          // MultiPolygon: coordinates[polyIdx][ringIdx][pointIdx]
          // 클릭 좌표에 가장 가까운 서브폴리곤 선택
          let minD = Infinity, bestPoly = 0;
          for (let pi = 0; pi < geom.coordinates.length; pi++) {
            const ring = geom.coordinates[pi][0];
            const cx = ring.reduce((s, pt) => s + pt[0], 0) / ring.length;
            const cy = ring.reduce((s, pt) => s + pt[1], 0) / ring.length;
            const d = Math.hypot(cx - clickLng, cy - clickLat);
            if (d < minD) { minD = d; bestPoly = pi; }
          }
          outerRing = geom.coordinates[bestPoly][0];
        } else {
          // Polygon: coordinates[ringIdx][pointIdx]
          outerRing = geom.coordinates[0];
        }
        outerRing = ensureCCW(outerRing);
        const edgeIdx = findNearestEdge(outerRing, clickLng, clickLat);
        const p1 = outerRing[edgeIdx];
        const p2 = outerRing[edgeIdx + 1];

        const faceWidth = haversineDistance(p1[1], p1[0], p2[1], p2[0]);
        if (faceWidth < 0.3) {
          statusEl.textContent = "너무 짧은 면입니다. 다른 면을 클릭하세요";
          return;
        }

        const repeatX = Math.max(1, Math.round(faceWidth / buildingHeight));

        // 같은 면 재클릭 시 토글(제거)
        const entityKey = pnu + "_" + edgeIdx;
        const existingIdx = textureEntities.findIndex(t => t.key === entityKey);
        if (existingIdx !== -1) {
          viewer.entities.remove(textureEntities[existingIdx].entity);
          textureEntities.splice(existingIdx, 1);
          updateAppliedFacesList();
          statusEl.textContent = `면${edgeIdx} 텍스처 제거됨`;
          return;
        }

        // CCW 외부 법선 오프셋 (1.5m) — VWorld 3D 타일 depth-fighting 방지 (cos(lat) 보정)
        const cosLat = Math.cos((p1[1] + p2[1]) / 2 * Math.PI / 180);
        const edgeDxM = (p2[0] - p1[0]) * cosLat; // 미터 비례 x
        const edgeDyM = (p2[1] - p1[1]);           // 미터 비례 y
        const edgeLenM = Math.sqrt(edgeDxM*edgeDxM + edgeDyM*edgeDyM);
        let op1 = p1, op2 = p2;
        if (edgeLenM > 0) {
          // 외부 법선 방향: (edgeDyM, -edgeDxM) → 도(degree) 단위로 변환
          const offsetLng = edgeDyM / edgeLenM * 1.5 / (111000 * cosLat);
          const offsetLat = -edgeDxM / edgeLenM * 1.5 / 111000;
          op1 = [p1[0] + offsetLng, p1[1] + offsetLat];
          op2 = [p2[0] + offsetLng, p2[1] + offsetLat];
        }

        const wallEntity = viewer.entities.add({
          name: "texture_wall_" + entityKey,
          wall: {
            positions: Cesium.Cartesian3.fromDegreesArray([op1[0], op1[1], op2[0], op2[1]]),
            minimumHeights: [wallBottom, wallBottom],
            maximumHeights: [wallTop, wallTop],
            material: new Cesium.ImageMaterialProperty({
              image: absImageUrl,
              repeat: new Cesium.Cartesian2(repeatX, 1),
              transparent: alpha < 1.0,
              color: new Cesium.Color(1, 1, 1, alpha),
            }),
          },
          properties: { pnu, type: "texture_overlay", edgeIdx },
        });

        const faceLabel = (p.building_name || pnu.slice(-6)) + " 면" + edgeIdx;
        textureEntities.push({ key: entityKey, pnu, entity: wallEntity, label: faceLabel });
        updateAppliedFacesList();

        statusEl.textContent =
          `✅ ${p.building_name || pnu} | 면${edgeIdx} (${faceWidth.toFixed(0)}m × ${buildingHeight}m) | 지면 ${terrainBase.toFixed(1)}m`;

      } catch(e) {
        if (e.name !== "AbortError") statusEl.textContent = "❌ " + e.message;
      }
    }

    function removeTexture() {
      const viewer = ws3d.viewer;
      textureEntities.forEach(t => viewer.entities.remove(t.entity));
      textureEntities = [];
      applyFaceTexture._validated = false;
      updateAppliedFacesList();
      document.getElementById("tex-status").textContent = "모든 텍스처 제거 완료";
    }

    function updateAppliedFacesList() {
      const list = document.getElementById("applied-faces");
      const label = document.getElementById("applied-faces-label");
      if (textureEntities.length === 0) {
        list.innerHTML = "";
        label.style.display = "none";
        return;
      }
      label.style.display = "block";
      list.innerHTML = textureEntities.map(t =>
        '<div class="face-item">' +
        '<span class="face-name">' + t.label + '</span>' +
        '<button class="face-remove" onclick="removeSingleTexture(\'' + t.key + '\')">×</button>' +
        '</div>'
      ).join("");
    }

    function removeSingleTexture(key) {
      const viewer = ws3d.viewer;
      const idx = textureEntities.findIndex(t => t.key === key);
      if (idx !== -1) {
        viewer.entities.remove(textureEntities[idx].entity);
        textureEntities.splice(idx, 1);
      }
      updateAppliedFacesList();
      document.getElementById("tex-status").textContent = "면 텍스처 제거됨";
    }

    // --- Panel ---
    function showPanel(detail) {
      const p = detail.properties;
      document.getElementById("p-name").textContent = p.building_name || "건물 정보";
      document.getElementById("p-grade").textContent = p.energy_grade || "-";
      document.getElementById("p-energy").textContent = p.total_energy ? Math.round(p.total_energy) : "-";
      document.getElementById("p-area").textContent = p.total_area != null ? p.total_area.toLocaleString() : "-";
      document.getElementById("p-pnu").textContent = p.pnu || "-";
      document.getElementById("p-usage").textContent = p.usage_type || "-";
      document.getElementById("p-struct").textContent = p.structure_type || "-";
      document.getElementById("p-floors").textContent =
        p.floors_above ? "지상 " + p.floors_above + "층 / 지하 " + (p.floors_below || 0) + "층" : "-";
      document.getElementById("p-height").textContent = p.height ? p.height.toFixed(1) + "m" : "-";
      document.getElementById("p-year").textContent = p.built_year || "-";

      // Energy breakdown chart
      if (p.energy) {
        const e = p.energy;
        const items = [
          { name: "난방", val: e.heating, color: "#ef4444" },
          { name: "냉방", val: e.cooling, color: "#3b82f6" },
          { name: "급탕", val: e.hot_water, color: "#f59e0b" },
          { name: "조명", val: e.lighting, color: "#a855f7" },
          { name: "환기", val: e.ventilation, color: "#22c55e" },
        ];
        const max = Math.max(...items.map((i) => i.val || 0));
        document.getElementById("p-energy-chart").innerHTML =
          "<div style='margin-top:12px;font-size:11px;color:#888'>에너지 소비 분해</div>" +
          items
            .map(
              (i) =>
                '<div style="display:flex;align-items:center;gap:6px;margin:3px 0;font-size:12px">' +
                '<span style="width:24px">' + i.name + "</span>" +
                '<div style="flex:1;background:#eee;border-radius:3px;height:14px">' +
                '<div style="width:' + ((i.val || 0) / max * 100) + '%;background:' + i.color + ';height:100%;border-radius:3px"></div>' +
                "</div>" +
                "<span>" + (i.val ? i.val.toFixed(1) : "-") + "</span></div>"
            )
            .join("");
      } else {
        document.getElementById("p-energy-chart").innerHTML = "";
      }

      document.getElementById("panel").style.display = "block";
    }

    function closePanel() {
      document.getElementById("panel").style.display = "none";
    }

    // --- Search ---
    let searchTimer = null;
    document.getElementById("search-input").addEventListener("input", function (e) {
      clearTimeout(searchTimer);
      const q = e.target.value;
      if (q.length < 2) {
        document.getElementById("search-results").style.display = "none";
        return;
      }
      searchTimer = setTimeout(function () {
        fetch(API + "/search?q=" + encodeURIComponent(q))
          .then((r) => r.json())
          .then((data) => {
            const el = document.getElementById("search-results");
            if (!data.results.length) { el.style.display = "none"; return; }
            el.innerHTML = data.results
              .map(
                (r) =>
                  '<div class="item" onclick="selectSearch(\'' + r.pnu + "'," + r.lng + "," + r.lat + ')">' +
                  "<b>" + (r.building_name || r.pnu) + "</b> <span style='color:#888;font-size:11px'>" +
                  (r.usage_type || "") + "</span></div>"
              )
              .join("");
            el.style.display = "block";
          });
      }, 300);
    });

    function selectSearch(pnu, lng, lat) {
      document.getElementById("search-results").style.display = "none";
      if (lng && lat) {
        ws3d.viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lng, lat, 300),
          orientation: { heading: Cesium.Math.toRadians(0), pitch: Cesium.Math.toRadians(-45), roll: 0 },
          duration: 1.5,
        });
      }
      fetch(API + "/buildings/" + pnu)
        .then((r) => r.json())
        .then((detail) => showPanel(detail))
        .catch(console.error);
    }
  </script>
